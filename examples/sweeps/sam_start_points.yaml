program: image_classifier:run
name: sam_start_points_sweep
method: grid
metric:
  goal: maximize
  name: test/accuracy
parameters:
  sharpness:
    value: "true"
  optimizer:
    values: ["sgd", "adam", "adam_sam_0.5", "adam_sam_0.9"]
  dataset:
    values: ["cifar10"]
  model:
    values: ["SmallResNet18"]
  batch_size:
    values: [16, 32, 64, 128]
  epochs:
    values: [100]
  sam_rho:
    values: [0.1, 0.05]
  sam_start:
    values: [0, 0.5, 0.9]

command:
  - pdm
  - run
  - launch
  - ${program}
  - ${args}
